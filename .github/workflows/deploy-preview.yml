name: Deploy protected preview

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: handleplan-preview-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-24.04
    # The worker readback allows one bounded 55-minute cycle, with margin for
    # image build/pull, migrations, verification, and a possible rollback.
    timeout-minutes: 120
    environment:
      name: preview
      url: https://handle.reidar.tech
    env:
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Check out the exact verified revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Configure pinned VPS access
        shell: bash
        env:
          VPS_SSH_HOST_KEY: ${{ vars.VPS_SSH_HOST_KEY }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "$VPS_SSH_HOST_KEY"
          test -n "$VPS_SSH_PRIVATE_KEY"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/handleplan_deploy
          chmod 600 ~/.ssh/handleplan_deploy
          printf '%s\n' "$VPS_SSH_HOST_KEY" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          ssh -i ~/.ssh/handleplan_deploy -o BatchMode=yes -o StrictHostKeyChecking=yes deploy@198.23.137.16 true

      - name: Build and deploy the verified commit on the VPS
        shell: bash
        env:
          REMOTE_BUNDLE_ROOT: /opt/apps/handleplan/deploy-bundles
        run: |
          set -euo pipefail
          [[ "$DEPLOY_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse HEAD)" = "$DEPLOY_SHA"
          git diff --quiet
          git diff --cached --quiet
          remote_bundle="$REMOTE_BUNDLE_ROOT/$DEPLOY_SHA"
          ssh -i ~/.ssh/handleplan_deploy -o BatchMode=yes -o StrictHostKeyChecking=yes \
            deploy@198.23.137.16 "install -d -m 700 '$remote_bundle'"
          scp -q -i ~/.ssh/handleplan_deploy -o BatchMode=yes -o StrictHostKeyChecking=yes \
            deploy/deploy-on-vps.sh deploy/deployment-state.sh \
            "deploy@198.23.137.16:$remote_bundle/"
          ssh -i ~/.ssh/handleplan_deploy -o BatchMode=yes -o StrictHostKeyChecking=yes \
            deploy@198.23.137.16 \
            "chmod 700 '$remote_bundle/deploy-on-vps.sh' && chmod 600 '$remote_bundle/deployment-state.sh' && '$remote_bundle/deploy-on-vps.sh' '$DEPLOY_SHA'"

      - name: Verify container and exact local health
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/handleplan_deploy -o BatchMode=yes -o StrictHostKeyChecking=yes \
            deploy@198.23.137.16 \
            "test \"\$(cat /opt/apps/handleplan/state/current-deployment)\" = 'v1 $DEPLOY_SHA current' && test \"\$(cat /opt/apps/handleplan/state/current-revision)\" = '$DEPLOY_SHA' && curl --fail --silent --show-error http://127.0.0.1:3004/api/health | grep -F '\"commit\":\"$DEPLOY_SHA\"'"
