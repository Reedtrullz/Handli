name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      promotion_manifest:
        description: Candidate manifest for externally trusted promotion verification
        required: false
        type: string

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    services:
      postgres:
        image: postgres:16.10-alpine@sha256:ab8380566c3ea09690a9ecaa85a59d82bfc6eb86744151a2a54335866c83a3e9
        env:
          POSTGRES_DB: handleplan
          POSTGRES_PASSWORD: ci_admin_url_safe_0000000000000001
          POSTGRES_USER: handleplan
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U handleplan -d handleplan"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24 action runtime
        with:
          # The exact first parent is built and booted after current migrations
          # on push CI; this is the minimum history required for that proof.
          fetch-depth: 2
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0, Node 24 action runtime
        with:
          node-version: 22.22.3
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Reject high and critical dependency advisories
        run: corepack pnpm security:audit
      - name: Verify dependency licenses and committed inventory
        run: corepack pnpm security:licenses
      - name: Scan repository for committed secrets
        run: corepack pnpm security:secrets
      - name: Test supply-chain checkers
        run: corepack pnpm security:scripts:test
      - name: Test disabled backup and restore tooling
        run: corepack pnpm operations:backup:test
      - name: Test external public-monitor contracts
        run: corepack pnpm operations:monitor:test
      - name: Test release-manifest checker
        run: corepack pnpm release:manifest:test
      - name: Generate revision-bound SPDX source SBOM
        run: corepack pnpm security:sbom
      - name: Validate V1 data
        run: corepack pnpm validate:v1-data
      - name: Test V1 basket acceptance foundation
        run: corepack pnpm acceptance:v1-baskets:test
      - name: Apply production migrations twice
        env:
          APP_DATABASE_PASSWORD: ci_app_url_safe_0000000000000000001
          DATABASE_MIGRATION_URL: postgresql://handleplan:ci_admin_url_safe_0000000000000001@127.0.0.1:5432/handleplan
          MIGRATIONS_DIR: ${{ github.workspace }}/deploy/migrations
          OPERATIONS_DATABASE_PASSWORD: ci_operations_url_safe_000000000001
          REVIEW_DATABASE_PASSWORD: ci_review_url_safe_00000000000000001
          WEB_DATABASE_PASSWORD: ci_web_url_safe_0000000000000000001
        run: |
          node deploy/migrate.mjs
          node deploy/migrate.mjs
      - name: Prove migration upgrade and backup restore
        env:
          APP_DATABASE_PASSWORD: ci_app_url_safe_0000000000000000001
          CI: "true"
          DATABASE_ADMIN_URL: postgresql://handleplan:ci_admin_url_safe_0000000000000001@127.0.0.1:5432/handleplan
          MIGRATIONS_DIR: ${{ github.workspace }}/deploy/migrations
          OPERATIONS_DATABASE_PASSWORD: ci_operations_url_safe_000000000001
          POSTGRES_CLIENT_HOST: 127.0.0.1
          POSTGRES_CLIENT_NETWORK: host
          REVIEW_DATABASE_PASSWORD: ci_review_url_safe_00000000000000001
          WEB_DATABASE_PASSWORD: ci_web_url_safe_0000000000000000001
        run: node tests/acceptance/prove-database-upgrade.mjs
      - name: Prove runtime database least privilege
        env:
          APP_DATABASE_PASSWORD: ci_app_url_safe_0000000000000000001
          CI: "true"
          DATABASE_ADMIN_URL: postgresql://handleplan:ci_admin_url_safe_0000000000000001@127.0.0.1:5432/handleplan
          MIGRATIONS_DIR: ${{ github.workspace }}/deploy/migrations
          OPERATIONS_DATABASE_PASSWORD: ci_operations_url_safe_000000000001
          RUNTIME_ROLE_PROOF_DATABASE: handleplan_runtime_role_proof_ci
          REVIEW_DATABASE_PASSWORD: ci_review_url_safe_00000000000000001
          WEB_DATABASE_PASSWORD: ci_web_url_safe_0000000000000000001
        run: node tests/acceptance/prove-runtime-database-role.mjs
      - name: Run PostgreSQL integration tests
        env:
          APP_DATABASE_URL: postgresql://handleplan_app:ci_app_url_safe_0000000000000000001@127.0.0.1:5432/handleplan
          DATABASE_URL: postgresql://handleplan:ci_admin_url_safe_0000000000000001@127.0.0.1:5432/handleplan
          DATABASE_MIGRATION_URL: postgresql://handleplan:ci_admin_url_safe_0000000000000001@127.0.0.1:5432/handleplan
          OPERATIONS_DATABASE_URL: postgresql://handleplan_operations:ci_operations_url_safe_000000000001@127.0.0.1:5432/handleplan
          RUN_DB_INTEGRATION: "1"
          RUN_OFFICIAL_OFFER_DB_INTEGRATION: "1"
          REVIEW_DATABASE_URL: postgresql://handleplan_review:ci_review_url_safe_00000000000000001@127.0.0.1:5432/handleplan
          WEB_DATABASE_URL: postgresql://handleplan_web:ci_web_url_safe_0000000000000000001@127.0.0.1:5432/handleplan
        # Integration files share one ephemeral database and deliberately append
        # immutable audit rows, so file-level parallelism would invalidate their
        # isolation contract even when every individual test is sequential.
        run: corepack pnpm --filter @handleplan/db exec vitest run --no-file-parallelism
      - name: Boot the exact previous application image against the expanded schema
        if: ${{ github.event_name == 'push' }}
        env:
          APP_COMMIT_SHA: ${{ github.sha }}
          WEB_DATABASE_PASSWORD: ci_web_url_safe_0000000000000000001
        run: |
          set -eu
          test "$(git rev-parse HEAD)" = "$APP_COMMIT_SHA"
          previous_revision=$(git rev-parse --verify "$APP_COMMIT_SHA^")
          printf '%s\n' "$previous_revision" | grep -Eq '^[0-9a-f]{40}$'
          git merge-base --is-ancestor "$previous_revision" "$APP_COMMIT_SHA"
          install -d -m 700 .artifacts/security
          previous_archive=.artifacts/security/handleplan-previous-source.tar
          previous_image="handleplan:previous-$previous_revision"
          previous_container="handleplan-previous-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          cleanup_previous_smoke() {
            docker rm -f "$previous_container" >/dev/null 2>&1 || true
          }
          trap cleanup_previous_smoke EXIT HUP INT TERM
          git archive --format=tar --output="$previous_archive" "$previous_revision"
          test "$(wc -c < "$previous_archive" | tr -d '[:space:]')" -gt 0
          test "$(wc -c < "$previous_archive" | tr -d '[:space:]')" -le 134217728
          docker build --platform=linux/amd64 \
            --build-arg APP_COMMIT_SHA="$previous_revision" \
            --tag "$previous_image" - < "$previous_archive"
          docker run --detach --name "$previous_container" --network host \
            --read-only --cap-drop ALL --security-opt no-new-privileges:true \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --env APP_COMMIT_SHA="$previous_revision" \
            --env DATABASE_URL="postgresql://handleplan_web:$WEB_DATABASE_PASSWORD@127.0.0.1:5432/handleplan" \
            --env NEXT_TELEMETRY_DISABLED=1 --env NODE_ENV=production \
            --env PORT=3014 "$previous_image" >/dev/null
          previous_ready=0
          attempts=0
          while [ "$attempts" -lt 24 ]; do
            if [ "$(docker inspect --format '{{.State.Running}}' "$previous_container")" != true ]; then
              echo "Previous application image exited before readiness" >&2
              exit 1
            fi
            if curl --fail --silent --show-error http://127.0.0.1:3014/api/health \
              | grep -F "\"commit\":\"$previous_revision\"" >/dev/null \
              && curl --fail --silent --show-error http://127.0.0.1:3014/api/ready \
              | grep -F '"status":"ok"' >/dev/null; then
              previous_ready=1
              break
            fi
            attempts=$((attempts + 1))
            sleep 5
          done
          test "$previous_ready" -eq 1 || {
            echo "Previous application image did not become ready against the expanded schema" >&2
            exit 1
          }
          test "$(docker inspect --format '{{.RestartCount}}' "$previous_container")" = 0
          printf 'previous-image-expanded-schema-smoke=ok revision=%s\n' "$previous_revision"
      - run: corepack pnpm typecheck
      - run: corepack pnpm lint
      - run: corepack pnpm test
      - name: Build the revision-bound public host artifact
        env:
          APP_COMMIT_SHA: ${{ github.sha }}
        run: corepack pnpm build
      - name: Prove the public browser harness fails closed on upstream exit
        env:
          APP_COMMIT_SHA: ${{ github.sha }}
        run: corepack pnpm e2e:public-lifecycle
      - name: Test immutable CI image handoff
        run: node --test tests/operations/deployment-artifact-handoff.test.mjs
      - name: Validate deployment assets
        id: validate-deployment-assets
        env:
          APP_COMMIT_SHA: ${{ github.sha }}
          APP_DATABASE_PASSWORD: ci_app_url_safe_0000000000000000001
          HANDLEPLAN_IMAGE: handleplan:${{ github.sha }}
          HANDLEPLAN_MIGRATION_IMAGE: handleplan:${{ github.sha }}
          KASSAL_API_KEY: ci-placeholder
          OPERATIONS_ACCESS_AUDIENCE: ci_operations_access_audience_0001
          OPERATIONS_ACCESS_ISSUER: https://ci.cloudflareaccess.com
          OPERATIONS_ACCESS_TEAM_DOMAIN: https://ci.cloudflareaccess.com
          OPERATIONS_BASE_URL: https://handleplan-operations.invalid
          OPERATIONS_DATABASE_PASSWORD: ci_operations_url_safe_000000000001
          OPERATIONS_SOURCE_ROSTER_JSON: '["kassalapp"]'
          POSTGRES_PASSWORD: ci_admin_url_safe_0000000000000001
          REVIEW_ACCESS_AUDIENCE: ci_review_access_audience_00000001
          REVIEW_ACCESS_ISSUER: https://ci.cloudflareaccess.com
          REVIEW_ACCESS_TEAM_DOMAIN: https://ci.cloudflareaccess.com
          REVIEW_BASE_URL: https://handleplan-review.invalid
          REVIEW_DATABASE_PASSWORD: ci_review_url_safe_00000000000000001
          REVIEW_EVIDENCE_PROOF_SECRET: QkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkI
          WEB_DATABASE_PASSWORD: ci_web_url_safe_0000000000000000001
        run: |
          set -eu
          sh -n deploy/*.sh
          node --check deploy/migrate.mjs
          docker run --rm --network none \
            -v "$PWD/deploy/Caddyfile.handleplan:/etc/caddy/Caddyfile:ro" \
            caddy:2.10.2-alpine@sha256:4c6e91c6ed0e2fa03efd5b44747b625fec79bc9cd06ac5235a779726618e530d \
            caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
          docker compose -f deploy/compose.production.yml config -q
          test "$(git rev-parse HEAD)" = "$APP_COMMIT_SHA"
          test "$HANDLEPLAN_IMAGE" = "handleplan:$APP_COMMIT_SHA"
          test "$HANDLEPLAN_MIGRATION_IMAGE" = "$HANDLEPLAN_IMAGE"
          git archive --format=tar --output=.artifacts/security/handleplan-source.tar "$APP_COMMIT_SHA"
          docker build --platform=linux/amd64 \
            --build-arg APP_COMMIT_SHA="$APP_COMMIT_SHA" \
            -t "$HANDLEPLAN_IMAGE" - < .artifacts/security/handleplan-source.tar
          test "$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' "$HANDLEPLAN_IMAGE")" = "$APP_COMMIT_SHA"
          test "$(docker image inspect --format '{{.Os}}/{{.Architecture}}' "$HANDLEPLAN_IMAGE")" = 'linux/amd64'
          image_id=$(docker image inspect --format '{{.Id}}' "$HANDLEPLAN_IMAGE")
          printf '%s\n' "$image_id" | grep -Eq '^sha256:[0-9a-f]{64}$'
          docker image save --output .artifacts/security/handleplan-image.docker.tar "$HANDLEPLAN_IMAGE"
          docker image rm "$HANDLEPLAN_IMAGE"
          if docker image inspect "$HANDLEPLAN_IMAGE" >/dev/null 2>&1; then
            echo "Revision tag survived the isolated archive reload boundary" >&2
            exit 1
          fi
          docker image load --input .artifacts/security/handleplan-image.docker.tar
          test "$(docker image inspect --format '{{.Id}}' "$HANDLEPLAN_IMAGE")" = "$image_id"
          test "$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' "$HANDLEPLAN_IMAGE")" = "$APP_COMMIT_SHA"
          test "$(docker image inspect --format '{{.Os}}/{{.Architecture}}' "$HANDLEPLAN_IMAGE")" = 'linux/amd64'
          image_verification=.artifacts/security/handleplan-production-image-verification.json
          node scripts/operations/verify-production-image.mjs \
            --image-reference "$HANDLEPLAN_IMAGE" \
            --expected-image-id "$image_id" \
            --expected-revision "$APP_COMMIT_SHA" \
            --archive .artifacts/security/handleplan-image.docker.tar \
            > "$image_verification"
          runtime_source_digest_sha256=$(jq -er '.runtimeSourceDigestSha256' "$image_verification")
          runtime_source_file_count=$(jq -er '.runtimeSourceFileCount' "$image_verification")
          runtime_shipment_digest_sha256=$(jq -er '.shipmentDigestSha256' "$image_verification")
          runtime_shipment_entry_count=$(jq -er '.shipmentEntryCount' "$image_verification")
          test "$(jq -er '.platform' "$image_verification")" = 'linux/amd64'
          for proof_digest in "$runtime_source_digest_sha256" "$runtime_shipment_digest_sha256"; do
            printf '%s\n' "$proof_digest" | grep -Eq '^[0-9a-f]{64}$'
          done
          for proof_count in "$runtime_source_file_count" "$runtime_shipment_entry_count"; do
            printf '%s\n' "$proof_count" | grep -Eq '^[1-9][0-9]{0,15}$'
          done
          jq -c . "$image_verification"
          corepack pnpm security:provenance
          artifact_dir=.artifacts/deployment
          install -d -m 700 "$artifact_dir"
          install -m 600 .artifacts/security/handleplan-source.tar "$artifact_dir/handleplan-source.tar"
          install -m 600 .artifacts/security/handleplan-image.docker.tar "$artifact_dir/handleplan-image.docker.tar"
          install -m 600 .artifacts/security/handleplan.provenance.json "$artifact_dir/handleplan.provenance.json"
          install -m 600 .artifacts/security/handleplan.spdx.json "$artifact_dir/handleplan.spdx.json"
          image_archive_sha256=$(sha256sum "$artifact_dir/handleplan-image.docker.tar" | awk '{print $1}')
          source_archive_sha256=$(sha256sum "$artifact_dir/handleplan-source.tar" | awk '{print $1}')
          provenance_sha256=$(sha256sum "$artifact_dir/handleplan.provenance.json" | awk '{print $1}')
          sbom_sha256=$(sha256sum "$artifact_dir/handleplan.spdx.json" | awk '{print $1}')
          printf '%s\n' \
            'format=handleplan-ci-image-bundle-v3' \
            "revision=$APP_COMMIT_SHA" \
            "image_reference=$HANDLEPLAN_IMAGE" \
            "image_id=$image_id" \
            'platform=linux/amd64' \
            "runtime_source_digest_sha256=$runtime_source_digest_sha256" \
            "runtime_source_file_count=$runtime_source_file_count" \
            "runtime_shipment_digest_sha256=$runtime_shipment_digest_sha256" \
            "runtime_shipment_entry_count=$runtime_shipment_entry_count" \
            "image_archive_sha256=$image_archive_sha256" \
            "source_archive_sha256=$source_archive_sha256" \
            "provenance_sha256=$provenance_sha256" \
            "sbom_sha256=$sbom_sha256" \
            "ci_run_id=$GITHUB_RUN_ID" \
            "ci_run_attempt=$GITHUB_RUN_ATTEMPT" \
            > "$artifact_dir/handleplan-image-bundle.v1"
          test "$(wc -l < "$artifact_dir/handleplan-image-bundle.v1" | tr -d '[:space:]')" -eq 15
          bundle_manifest_sha256=$(sha256sum "$artifact_dir/handleplan-image-bundle.v1" | awk '{print $1}')
          node scripts/operations/verify-ci-image-bundle.mjs \
            "$artifact_dir/handleplan-image-bundle.v1" \
            "$bundle_manifest_sha256" \
            "$APP_COMMIT_SHA" \
            "$image_id" \
            "$GITHUB_RUN_ID" \
            "$GITHUB_RUN_ATTEMPT"
          printf 'image_id=%s\n' "$image_id" >> "$GITHUB_OUTPUT"
          printf 'bundle_manifest_sha256=%s\n' "$bundle_manifest_sha256" >> "$GITHUB_OUTPUT"
          sha256sum "$artifact_dir"/*
      - name: Reset the exact-image PostgreSQL database
        env:
          POSTGRES_SERVICE_CONTAINER: ${{ job.services.postgres.id }}
        run: |
          set -eu
          test -n "$POSTGRES_SERVICE_CONTAINER"
          test "$(docker inspect --format '{{.State.Running}}' "$POSTGRES_SERVICE_CONTAINER")" = true
          docker exec --interactive "$POSTGRES_SERVICE_CONTAINER" \
            psql -X --no-password --username handleplan --dbname postgres \
            --set ON_ERROR_STOP=1 <<'SQL'
          drop database if exists handleplan with (force);
          create database handleplan
            with owner handleplan template template0 encoding 'UTF8';
          revoke all privileges on database handleplan from public;
          SQL
          docker exec --interactive "$POSTGRES_SERVICE_CONTAINER" \
            psql -X --no-password --username handleplan --dbname handleplan \
            --set ON_ERROR_STOP=1 <<'SQL'
          revoke all privileges on schema public from public;
          SQL
          reset_proof=$(
            docker exec "$POSTGRES_SERVICE_CONTAINER" \
              psql -X --quiet --no-password \
              --username handleplan --dbname handleplan \
              --tuples-only --no-align --set ON_ERROR_STOP=1 \
              --command "
                select
                  current_database() = 'handleplan'
                  and current_user = 'handleplan'
                  and pg_get_userbyid((
                    select datdba from pg_database where datname = 'handleplan'
                  )) = 'handleplan'
                  and to_regclass('public.handleplan_schema_migrations') is null
                  and not exists (
                    select 1 from pg_tables where schemaname = 'public'
                  )
                  and not has_database_privilege(
                    'handleplan_app', 'handleplan', 'connect'
                  )
                  and not has_database_privilege(
                    'handleplan_web', 'handleplan', 'connect'
                  )
                  and not has_database_privilege(
                    'handleplan_review', 'handleplan', 'connect'
                  )
                  and not has_database_privilege(
                    'handleplan_operations', 'handleplan', 'connect'
                  );
              "
          )
          test "$reset_proof" = t
      - name: Prove the packaged migrator and worker from the exact image
        env:
          APP_COMMIT_SHA: ${{ github.sha }}
          APP_DATABASE_PASSWORD: ci_app_url_safe_0000000000000000001
          DATABASE_MIGRATION_URL: postgresql://handleplan:ci_admin_url_safe_0000000000000001@127.0.0.1:5432/handleplan
          EXPECTED_IMAGE_ID: ${{ steps.validate-deployment-assets.outputs.image_id }}
          HANDLEPLAN_IMAGE: handleplan:${{ github.sha }}
          OPERATIONS_DATABASE_PASSWORD: ci_operations_url_safe_000000000001
          REVIEW_DATABASE_PASSWORD: ci_review_url_safe_00000000000000001
          WEB_DATABASE_PASSWORD: ci_web_url_safe_0000000000000000001
        run: |
          set -eu
          worker_container="handleplan-ci-worker-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          cleanup_private_runtime_proof() {
            docker rm -f "$worker_container" >/dev/null 2>&1 || true
          }
          trap cleanup_private_runtime_proof EXIT HUP INT TERM
          test "$(docker image inspect --format '{{.Id}}' "$HANDLEPLAN_IMAGE")" = "$EXPECTED_IMAGE_ID"
          test "$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' "$EXPECTED_IMAGE_ID")" = "$APP_COMMIT_SHA"
          test "$(docker image inspect --format '{{.Os}}/{{.Architecture}}' "$EXPECTED_IMAGE_ID")" = 'linux/amd64'
          migration_pass=0
          while [ "$migration_pass" -lt 2 ]; do
            docker run --rm --network host --read-only \
              --cap-drop ALL --security-opt no-new-privileges:true \
              --tmpfs /tmp:rw,noexec,nosuid,nodev,size=32m \
              --entrypoint node \
              --env APP_DATABASE_PASSWORD="$APP_DATABASE_PASSWORD" \
              --env DATABASE_MIGRATION_URL="$DATABASE_MIGRATION_URL" \
              --env NODE_ENV=production \
              --env OPERATIONS_DATABASE_PASSWORD="$OPERATIONS_DATABASE_PASSWORD" \
              --env REVIEW_DATABASE_PASSWORD="$REVIEW_DATABASE_PASSWORD" \
              --env WEB_DATABASE_PASSWORD="$WEB_DATABASE_PASSWORD" \
              "$EXPECTED_IMAGE_ID" /app/deploy/migrate.mjs
            migration_pass=$((migration_pass + 1))
          done
          docker run --detach --name "$worker_container" --network host --read-only \
            --cap-drop ALL --security-opt no-new-privileges:true \
            --tmpfs /tmp:rw,noexec,nosuid,nodev,size=32m \
            --entrypoint node \
            --env APP_COMMIT_SHA="$APP_COMMIT_SHA" \
            --env DATABASE_URL="postgresql://handleplan_app:$APP_DATABASE_PASSWORD@127.0.0.1:5432/handleplan" \
            --env KASSAL_BASE_URL=https://127.0.0.1:1 \
            --env KASSAL_SOURCE_ACCESS=blocked \
            --env NODE_ENV=production \
            --env OFFICIAL_OFFER_FOUNDATION_ENABLED=false \
            --env OFFICIAL_OFFER_PRIVATE_CAPTURE_ROOT=/tmp/private-captures \
            --env WORKER_CYCLE_INTERVAL_MS=15000 \
            --env WORKER_LEASE_TTL_MS=30000 \
            --env WORKER_SHUTDOWN_GRACE_MS=5000 \
            --env WORKER_TARGET_LIMIT=1 \
            "$EXPECTED_IMAGE_ID" /app/apps/worker/dist/main.mjs >/dev/null
          test "$(docker inspect --format '{{.Image}}' "$worker_container")" = "$EXPECTED_IMAGE_ID"
          test "$(docker inspect --format '{{.Config.Image}}' "$worker_container")" = "$EXPECTED_IMAGE_ID"
          test "$(docker inspect --format '{{json .Config.Entrypoint}}' "$worker_container")" = '["node"]'
          test "$(docker inspect --format '{{json .Config.Cmd}}' "$worker_container")" = '["/app/apps/worker/dist/main.mjs"]'
          test "$(docker inspect --format '{{.HostConfig.ReadonlyRootfs}}' "$worker_container")" = true
          test "$(docker inspect --format '{{.HostConfig.NetworkMode}}' "$worker_container")" = host
          test "$(docker inspect --format '{{json .Mounts}}' "$worker_container")" = '[]'
          test "$(docker inspect --format '{{.RestartCount}}' "$worker_container")" = 0
          worker_ready=0
          attempts=0
          while [ "$attempts" -lt 45 ]; do
            if [ "$(docker inspect --format '{{.State.Running}}' "$worker_container")" != true ]; then
              echo "Exact-image worker exited before readiness" >&2
              exit 1
            fi
            worker_health=$(curl --max-time 2 --silent --show-error \
              http://127.0.0.1:3005/health || true)
            if [ "${#worker_health}" -gt 0 ] \
              && [ "${#worker_health}" -le 65536 ] \
              && printf '%s' "$worker_health" | jq -e --arg revision "$APP_COMMIT_SHA" '
                .schemaVersion == 1
                and .revision == $revision
                and .live == true
                and .ready == true
                and (.status == "ok" or .status == "degraded")
                and .scheduler.completedCycles >= 1
                and .scheduler.failedCycles == 0
                and .scheduler.lastCycle != null
                and .scheduler.lastCycle.leaseAcquired == true
              ' >/dev/null; then
              worker_ready=1
              break
            fi
            attempts=$((attempts + 1))
            sleep 1
          done
          test "$worker_ready" -eq 1
          docker stop --time 15 "$worker_container" >/dev/null
          test "$(docker inspect --format '{{.State.Running}}' "$worker_container")" = false
          test "$(docker inspect --format '{{.State.ExitCode}}' "$worker_container")" = 0
          test "$(docker inspect --format '{{.RestartCount}}' "$worker_container")" = 0
          docker rm "$worker_container" >/dev/null
          printf 'exact-image-private-runtime-proof=ok image=%s migrations=2 worker_cycles>=1\n' \
            "$EXPECTED_IMAGE_ID"
      - name: Seed the governed exact-image browser fixture from the host
        env:
          APP_COMMIT_SHA: ${{ github.sha }}
          HANDLEPLAN_IMAGE_DATABASE_URL: postgresql://handleplan_web:ci_web_url_safe_0000000000000000001@127.0.0.1:5432/handleplan
          HANDLEPLAN_IMAGE_SEED_APP_DATABASE_URL: postgresql://handleplan_app:ci_app_url_safe_0000000000000000001@127.0.0.1:5432/handleplan
          HANDLEPLAN_IMAGE_SEED_DATABASE_URL: postgresql://handleplan:ci_admin_url_safe_0000000000000001@127.0.0.1:5432/handleplan
          HANDLEPLAN_IMAGE_SEED_REVIEW_DATABASE_URL: postgresql://handleplan_review:ci_review_url_safe_00000000000000001@127.0.0.1:5432/handleplan
          RUN_PRODUCTION_IMAGE_DATABASE_SEED: "1"
        run: >-
          corepack pnpm --filter @handleplan/db exec vitest run
          src/production-image-database-seed.integration.test.ts
          --no-file-parallelism
      - run: corepack pnpm exec playwright install --with-deps chromium firefox webkit
      - name: Prove the exact production image in Chromium, Firefox, and WebKit
        env:
          APP_COMMIT_SHA: ${{ github.sha }}
          HANDLEPLAN_IMAGE_DATABASE_URL: postgresql://handleplan_web:ci_web_url_safe_0000000000000000001@127.0.0.1:5432/handleplan
          HANDLEPLAN_IMAGE_SEED_APP_DATABASE_URL: postgresql://handleplan_app:ci_app_url_safe_0000000000000000001@127.0.0.1:5432/handleplan
          HANDLEPLAN_IMAGE_SEED_DATABASE_URL: postgresql://handleplan:ci_admin_url_safe_0000000000000001@127.0.0.1:5432/handleplan
          HANDLEPLAN_IMAGE_SEED_REVIEW_DATABASE_URL: postgresql://handleplan_review:ci_review_url_safe_00000000000000001@127.0.0.1:5432/handleplan
          HANDLEPLAN_IMAGE_ID: ${{ steps.validate-deployment-assets.outputs.image_id }}
          HANDLEPLAN_IMAGE_REFERENCE: handleplan:${{ github.sha }}
        run: corepack pnpm e2e:image
      - name: Prove revision-bound Handlemodus in Chromium, Firefox, and WebKit
        env:
          APP_COMMIT_SHA: ${{ github.sha }}
        run: corepack pnpm e2e:handlemodus
      - name: Prove the revision-bound public host artifact in Chromium, Firefox, and WebKit
        env:
          APP_COMMIT_SHA: ${{ github.sha }}
        run: corepack pnpm exec playwright test
      - name: Reconfirm the exact image and frozen bundle before upload
        env:
          APP_COMMIT_SHA: ${{ github.sha }}
          EXPECTED_BUNDLE_MANIFEST_SHA256: ${{ steps.validate-deployment-assets.outputs.bundle_manifest_sha256 }}
          EXPECTED_IMAGE_ID: ${{ steps.validate-deployment-assets.outputs.image_id }}
          HANDLEPLAN_IMAGE: handleplan:${{ github.sha }}
        run: |
          set -eu
          test "$(docker image inspect --format '{{.Id}}' "$HANDLEPLAN_IMAGE")" = "$EXPECTED_IMAGE_ID"
          test "$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' "$EXPECTED_IMAGE_ID")" = "$APP_COMMIT_SHA"
          node scripts/operations/verify-ci-image-bundle.mjs \
            .artifacts/deployment/handleplan-image-bundle.v1 \
            "$EXPECTED_BUNDLE_MANIFEST_SHA256" \
            "$APP_COMMIT_SHA" \
            "$EXPECTED_IMAGE_ID" \
            "$GITHUB_RUN_ID" \
            "$GITHUB_RUN_ATTEMPT"
      - name: Upload exact CI image bundle
        id: upload-image-bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: handleplan-ci-image-${{ github.sha }}-attempt-${{ github.run_attempt }}
          path: .artifacts/deployment/
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  verify-promotion:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.promotion_manifest != '' }}
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: release-promotion
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24 action runtime
        with:
          fetch-depth: 2
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0, Node 24 action runtime
        with:
          node-version: 22.22.3
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile --ignore-scripts
      - name: Verify externally trusted V1 promotion candidate
        env:
          HANDLEPLAN_RELEASE_IMAGE_SIGNER: ${{ vars.HANDLEPLAN_RELEASE_IMAGE_SIGNER }}
          HANDLEPLAN_RELEASE_PROVENANCE_SIGNER: ${{ vars.HANDLEPLAN_RELEASE_PROVENANCE_SIGNER }}
          HANDLEPLAN_RELEASE_TRUST_KEY_ID: ${{ vars.HANDLEPLAN_RELEASE_TRUST_KEY_ID }}
          HANDLEPLAN_RELEASE_TRUST_PUBLIC_KEY_BASE64: ${{ secrets.HANDLEPLAN_RELEASE_TRUST_PUBLIC_KEY_BASE64 }}
          HANDLEPLAN_RELEASE_TRUST_REPOSITORY: ${{ vars.HANDLEPLAN_RELEASE_TRUST_REPOSITORY }}
          PROMOTION_MANIFEST: ${{ inputs.promotion_manifest }}
        run: corepack pnpm release:manifest:verify -- --require-promotion "$PROMOTION_MANIFEST"
