services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: handleplan
      POSTGRES_PASSWORD: handleplan
      POSTGRES_USER: handleplan
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U handleplan -d handleplan"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - handleplan-postgres-data:/var/lib/postgresql/data

volumes:
  handleplan-postgres-data:
